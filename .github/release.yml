changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: Features
      labels:
        - enhancement
        - feature
        - feat
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: CI and Build
      labels:
        - ci
        - build
    - title: Maintenance
      labels:
        - chore
        - refactor
        - dependencies
    - title: Other Changes
      labels:
        - "*"
