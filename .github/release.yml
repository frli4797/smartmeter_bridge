changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: Home Assistant Add-on
      labels:
        - addon
        - home-assistant
        - supervisor
    - title: Bridge Runtime
      labels:
        - runtime
        - modbus
        - logging
        - healthcheck
    - title: Docker and Deployment
      labels:
        - docker
        - container
        - deployment
        - build
    - title: CI and Release Automation
      labels:
        - ci
        - github-actions
        - release
    - title: Features
      labels:
        - enhancement
        - feature
        - feat
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Maintenance
      labels:
        - chore
        - refactor
        - dependencies
    - title: Other Changes
      labels:
        - "*"
